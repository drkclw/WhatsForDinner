openapi: 3.0.3
info:
  title: WhatsForDinner API
  description: REST API for meal planning application
  version: 1.0.0
  
servers:
  - url: http://localhost:5140/api
    description: Development server

paths:
  /recipes:
    get:
      summary: Get all recipes for the current user
      operationId: getRecipes
      tags:
        - Recipes
      responses:
        '200':
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'
    
  /recipes/{id}:
    get:
      summary: Get a specific recipe by ID
      operationId: getRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recipe details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    put:
      summary: Update a recipe
      operationId: updateRecipe
      tags:
        - Recipes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeUpdateRequest'
      responses:
        '200':
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /weekly-plan:
    get:
      summary: Get the current user's weekly plan with recipes
      operationId: getWeeklyPlan
      tags:
        - Weekly Plan
      responses:
        '200':
          description: Weekly plan with recipe list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlan'

  /weekly-plan/items:
    post:
      summary: Add a recipe to the weekly plan
      operationId: addToWeeklyPlan
      tags:
        - Weekly Plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToWeeklyPlanRequest'
      responses:
        '201':
          description: Recipe added to plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlanItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /weekly-plan/items/{id}:
    delete:
      summary: Remove a recipe from the weekly plan
      operationId: removeFromWeeklyPlan
      tags:
        - Weekly Plan
      parameters:
        - name: id
          in: path
          required: true
          description: WeeklyPlanItem ID (not Recipe ID)
          schema:
            type: integer
      responses:
        '204':
          description: Recipe removed from plan
        '404':
          description: Weekly plan item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Recipe:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 200
          example: "Spaghetti Bolognese"
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: "Classic Italian pasta with meat sauce"
        ingredients:
          type: string
          maxLength: 2000
          nullable: true
          example: "Spaghetti\nGround beef\nTomato sauce\nOnion\nGarlic"
        cookTimeMinutes:
          type: integer
          minimum: 0
          nullable: true
          example: 45
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RecipeUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
          minLength: 1
          example: "Spaghetti Bolognese"
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: "Classic Italian pasta with meat sauce"
        ingredients:
          type: string
          maxLength: 2000
          nullable: true
          example: "Spaghetti\nGround beef\nTomato sauce"
        cookTimeMinutes:
          type: integer
          minimum: 0
          nullable: true
          example: 45

    WeeklyPlan:
      type: object
      required:
        - id
        - items
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyPlanItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WeeklyPlanItem:
      type: object
      required:
        - id
        - recipe
        - addedAt
      properties:
        id:
          type: integer
          description: WeeklyPlanItem ID (use this for removal)
          example: 1
        recipe:
          $ref: '#/components/schemas/Recipe'
        addedAt:
          type: string
          format: date-time

    AddToWeeklyPlanRequest:
      type: object
      required:
        - recipeId
      properties:
        recipeId:
          type: integer
          description: ID of the recipe to add
          example: 1

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Resource not found"

    ValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            name: ["Name is required", "Name must be at most 200 characters"]
